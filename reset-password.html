<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Auth POC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="container-fluid px-0">
      <div class="row justify-content-center mx-0">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4 px-3 px-sm-0">

          <div class="auth-card card">

            <!-- Header -->
            <div class="card-header-auth accent-purple">
              <div class="header-icon"><i class="bi bi-shield-lock-fill"></i></div>
              <h4>Reset Password</h4>
              <p>Create a strong new password</p>
            </div>

            <!-- Body -->
            <div class="card-body">
              <form action="login.html" method="get" id="resetForm" novalidate>

                <!-- New Password -->
                <div class="mb-1">
                  <label class="form-label-custom">New Password</label>
                  <div class="input-group-custom focus-purple" id="grp-new">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" id="new-password" name="new_password" class="input-field"
                           placeholder="Min. 8 characters" required minlength="8">
                    <span class="input-toggle" onclick="toggleVis('new-password','icon-new')">
                      <i class="bi bi-eye" id="icon-new"></i>
                    </span>
                  </div>
                  <div class="field-error" id="err-new">Min. 8 characters required.</div>
                </div>

                <!-- Strength bar -->
                <div class="mb-3">
                  <div class="strength-track">
                    <div class="strength-fill" id="strengthFill"></div>
                  </div>
                  <div class="strength-meta">
                    <span>Password strength</span>
                    <span id="strengthLabel"></span>
                  </div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                  <label class="form-label-custom">Confirm Password</label>
                  <div class="input-group-custom focus-purple" id="grp-confirm">
                    <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="confirm-password" name="confirm_password" class="input-field"
                           placeholder="Re-enter new password" required>
                    <span class="input-toggle" onclick="toggleVis('confirm-password','icon-confirm')">
                      <i class="bi bi-eye" id="icon-confirm"></i>
                    </span>
                  </div>
                  <div class="field-error" id="err-confirm">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn-auth btn-purple">
                  <i class="bi bi-check-circle"></i> Update Password
                </button>

              </form>
            </div>
          </div>

          <p class="auth-footer">&copy; 2025 Auth POC. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleVis(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      const show  = input.type === 'password';
      input.type     = show ? 'text' : 'password';
      icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    }

    const newPwd  = document.getElementById('new-password');
    const conPwd  = document.getElementById('confirm-password');
    const fill    = document.getElementById('strengthFill');
    const lbl     = document.getElementById('strengthLabel');

    const levels = [
      { w: '0%',   c: '#e4e7f0', t: '' },
      { w: '25%',  c: '#ef4444', t: 'Weak' },
      { w: '50%',  c: '#f59e0b', t: 'Fair' },
      { w: '75%',  c: '#eab308', t: 'Good' },
      { w: '100%', c: '#10b981', t: 'Strong' },
    ];

    newPwd.addEventListener('input', function () {
      const v = this.value;
      let s = 0;
      if (v.length >= 8)          s++;
      if (/[A-Z]/.test(v))        s++;
      if (/[0-9]/.test(v))        s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      fill.style.width           = levels[s].w;
      fill.style.backgroundColor = levels[s].c;
      lbl.textContent            = levels[s].t;
      lbl.style.color            = levels[s].c;
    });

    function setGrp(grpId, errId, ok) {
      document.getElementById(grpId).classList.toggle('is-invalid-group', !ok);
      document.getElementById(grpId).classList.toggle('is-valid-group',    ok);
      document.getElementById(errId).classList.toggle('visible',           !ok);
    }

    conPwd.addEventListener('input', function () {
      if (this.value) setGrp('grp-confirm', 'err-confirm', this.value === newPwd.value);
    });

    document.getElementById('resetForm').addEventListener('submit', function (e) {
      e.preventDefault();
      let valid = true;
      if (!newPwd.checkValidity())                          { setGrp('grp-new',     'err-new',     false); valid = false; }
      else                                                   { setGrp('grp-new',     'err-new',     true); }
      if (!conPwd.checkValidity() || conPwd.value !== newPwd.value) { setGrp('grp-confirm', 'err-confirm', false); valid = false; }
      else                                                   { setGrp('grp-confirm', 'err-confirm', true); }
      if (valid) this.submit();
    });
  </script>
</body>
</html>
