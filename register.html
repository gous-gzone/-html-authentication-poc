<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Auth POC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="container-fluid px-0">
      <div class="row justify-content-center mx-0">
        <div class="col-12 col-sm-10 col-md-7 col-lg-6 col-xl-5 px-3 px-sm-0">

          <div class="auth-card card wide">

            <!-- Header -->
            <div class="card-header-auth accent-green">
              <div class="header-icon"><i class="bi bi-person-plus-fill"></i></div>
              <h4>Create Account</h4>
              <p>Fill in the details to get started</p>
            </div>

            <!-- Body -->
            <div class="card-body">
              <form action="login.html" method="get" id="registerForm" novalidate>

                <!-- Name + Email row on md+ -->
                <div class="row g-3 mb-0">
                  <div class="col-12 col-md-6">
                    <div class="mb-3">
                      <label class="form-label-custom">Full Name</label>
                      <div class="input-group-custom focus-green" id="grp-name">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input type="text" id="full-name" name="full_name" class="input-field"
                               placeholder="John Doe" required minlength="3">
                      </div>
                      <div class="field-error" id="err-name">Min. 3 characters required.</div>
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <div class="mb-3">
                      <label class="form-label-custom">Email Address</label>
                      <div class="input-group-custom focus-green" id="grp-email">
                        <span class="input-icon"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" name="email" class="input-field"
                               placeholder="you@example.com" required>
                      </div>
                      <div class="field-error" id="err-email">Enter a valid email.</div>
                    </div>
                  </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label class="form-label-custom">Password</label>
                  <div class="input-group-custom focus-green" id="grp-password">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" id="password" name="password" class="input-field"
                           placeholder="Min. 8 characters" required minlength="8">
                  </div>
                  <div class="field-error" id="err-password">Min. 8 characters required.</div>
                </div>

                <!-- Confirm Password -->
                <div class="mb-4">
                  <label class="form-label-custom">Confirm Password</label>
                  <div class="input-group-custom focus-green" id="grp-confirm">
                    <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="confirm-password" name="confirm_password" class="input-field"
                           placeholder="Re-enter your password" required>
                  </div>
                  <div class="field-error" id="err-confirm">Passwords do not match.</div>
                </div>

                <button type="submit" class="btn-auth btn-green">
                  <i class="bi bi-person-check"></i> Create Account
                </button>

              </form>

              <div class="auth-divider">or</div>

              <p class="auth-link-row">
                Already have an account?
                <a href="login.html" class="auth-link green">Sign in</a>
              </p>
            </div>

          </div>

          <p class="auth-footer">&copy; 2025 Auth POC. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form    = document.getElementById('registerForm');
    const pwd     = document.getElementById('password');
    const confirm = document.getElementById('confirm-password');

    const fields = [
      { el: document.getElementById('full-name'), grp: 'grp-name',     err: 'err-name' },
      { el: document.getElementById('email'),     grp: 'grp-email',    err: 'err-email' },
      { el: pwd,                                  grp: 'grp-password', err: 'err-password' },
      { el: confirm,                              grp: 'grp-confirm',  err: 'err-confirm' },
    ];

    function setState(grpId, errId, ok) {
      document.getElementById(grpId).classList.toggle('is-invalid-group', !ok);
      document.getElementById(grpId).classList.toggle('is-valid-group',    ok);
      document.getElementById(errId).classList.toggle('visible',           !ok);
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let valid = true;
      fields.forEach(({ el, grp, err }) => {
        const ok = el.checkValidity();
        setState(grp, err, ok);
        if (!ok) valid = false;
      });
      if (pwd.value !== confirm.value) { setState('grp-confirm', 'err-confirm', false); valid = false; }
      if (valid) form.submit();
    });

    confirm.addEventListener('input', function () {
      if (this.value) setState('grp-confirm', 'err-confirm', this.value === pwd.value);
    });
  </script>
</body>
</html>
