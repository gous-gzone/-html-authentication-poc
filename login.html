<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Auth POC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="container-fluid px-0">
      <div class="row justify-content-center mx-0">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4 px-3 px-sm-0">

          <div class="auth-card card">

            <!-- Header -->
            <div class="card-header-auth accent-blue">
              <div class="header-icon"><i class="bi bi-shield-lock-fill"></i></div>
              <h4>Welcome Back</h4>
              <p>Sign in to your account</p>
            </div>

            <!-- Body -->
            <div class="card-body">
              <form action="dashboard.html" method="get">

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label-custom">Email Address</label>
                  <div class="input-group-custom">
                    <span class="input-icon"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="input-field"
                           placeholder="you@example.com" required>
                  </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label-custom mb-0">Password</label>
                    <a href="forgot-password.html" class="auth-link blue" style="font-size:0.78rem;">
                      Forgot password?
                    </a>
                  </div>
                  <div class="input-group-custom">
                    <span class="input-icon"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="input-field"
                           placeholder="Enter your password" required>
                  </div>
                </div>

                <button type="submit" class="btn-auth btn-blue">
                  <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>

              </form>

              <div class="auth-divider">or</div>

              <p class="auth-link-row">
                Don't have an account?
                <a href="register.html" class="auth-link blue">Create one</a>
              </p>
            </div>

          </div>

          <p class="auth-footer">&copy; 2025 Auth POC. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
