<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Auth POC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">

  <div class="auth-wrapper">
    <div class="container-fluid px-0">
      <div class="row justify-content-center mx-0">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4 px-3 px-sm-0">

          <div class="auth-card card">

            <!-- Header -->
            <div class="card-header-auth accent-orange">
              <div class="header-icon"><i class="bi bi-key-fill"></i></div>
              <h4>Forgot Password?</h4>
              <p>No worries, we'll help you reset it</p>
            </div>

            <!-- Body -->
            <div class="card-body">

              <div class="info-box mb-4">
                <i class="bi bi-info-circle-fill"></i>
                <span>Enter your registered email and we'll send you a reset link.</span>
              </div>

              <form action="reset-password.html" method="get">

                <div class="mb-4">
                  <label class="form-label-custom">Email Address</label>
                  <div class="input-group-custom focus-orange">
                    <span class="input-icon"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="input-field"
                           placeholder="you@example.com" required>
                  </div>
                </div>

                <button type="submit" class="btn-auth btn-orange">
                  <i class="bi bi-send"></i> Send Reset Link
                </button>

              </form>

              <div class="text-center mt-4">
                <a href="login.html" class="auth-back-link">
                  <i class="bi bi-arrow-left"></i> Back to Sign In
                </a>
              </div>

            </div>
          </div>

          <p class="auth-footer">&copy; 2025 Auth POC. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
